{% extends "base.html" %}
{% block title %}Login | QA Report{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card p-4">
      <h4 class="fw-bold mb-1">Iniciar sesión</h4>
      <p class="text-secondary mb-4">Accede para administrar documentos por proyecto.</p>

      {% if form.errors %}
        <div class="alert alert-danger py-2">Usuario o contraseña incorrectos.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input class="form-control" type="text" name="username" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input class="form-control" type="password" name="password" required>
        </div>

        <button class="btn btn-primary w-100" type="submit">Entrar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
