{% extends "base.html" %}
{% block title %}Proyectos | QA Report{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h3 class="fw-bold mb-0">Proyectos</h3>
    <div class="text-secondary">Selecciona un proyecto para ver sus Test Cases y documentos.</div>
  </div>
</div>

<div class="row g-3">
  {% for p in projects %}
    <div class="col-12 col-md-6 col-lg-4">
      <a class="text-decoration-none" href="{% url 'qa:project_detail' p.pk %}">
        <div class="card p-3 h-100">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <div class="fw-bold">{{ p.name }}</div>
              <div class="text-secondary small">Abrir proyecto</div>
            </div>
            <span class="badge text-bg-primary">Ver</span>
          </div>
        </div>
      </a>
    </div>
  {% empty %}
    <div class="col-12">
      <div class="alert alert-warning">No hay proyectos todavía.</div>
    </div>
  {% endfor %}
</div>
{% endblock %}
