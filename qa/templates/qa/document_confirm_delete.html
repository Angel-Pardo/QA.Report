{% extends "base.html" %}
{% block title %}Eliminar | QA Report{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card p-4">
      <h4 class="fw-bold mb-2">Eliminar documento</h4>
      <p class="text-secondary mb-3">Esta acción no se puede deshacer.</p>

      <div class="alert alert-warning">
        <b>{{ doc.title }}</b>
      </div>

      <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Eliminar</button>
        <a class="btn btn-outline-secondary" href="{% url 'qa:testcase_documents' doc.test_case.pk %}">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
